<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Abiturient natijalari</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: system-ui,Segoe UI,sans-serif;
  background:#FDF3E1;
  color:#0B3D21;
  display:flex;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:1200px;
  padding:18px;
}

/* HEADER */
.header{
  background:#0B3D21;
  color:#fff;
  padding:18px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  margin-bottom:14px;
  animation:fadeDown .6s ease;
}

.header h1{
  font-size:18px;
  font-weight:700;
}

/* SUMMARY */
.summary{
  background:#fff;
  border-radius:16px;
  padding:14px;
  border:1px solid rgba(11,61,33,0.15);
  margin-bottom:14px;
  animation:fadeUp .6s ease;
}

.summary-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.total{
  font-size:32px;
  font-weight:800;
  color:#0B3D21;
  animation:pop .5s ease;
}

.status{
  background:#ffc455;
  color:#000000;
  padding:6px 10px;
  border-radius:999px;
  font-weight: 600;
  font-size:12px;
  animation:pulse 2s infinite;
}

.progress{
  margin-top:10px;
  height:8px;
  background:#FDF3E1;
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(11,61,33,0.15);
}

.progress div{
  height:100%;
  width:0%;
  background:#0B3D21;
  transition:1s ease;
}

/* CARDS */
.cards{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  border:1px solid rgba(11,61,33,0.15);
  box-shadow:0 8px 18px rgba(0,0,0,0.06);
  animation:fadeUp .5s ease;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name{
  font-weight:700;
}

.badge{
  background:#0B3D21;
  color:#FDF3E1;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
}

/* STAT BOXES */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.box{
  background:#FDF3E1;
  border-radius:10px;
  padding:10px;
  border:1px solid rgba(11,61,33,0.15);
  text-align:center;
  transition:.3s;
}

.box:hover{
  transform:translateY(-2px);
}

.label{
  font-size:10px;
  color:#0B3D21;
  opacity:.7;
}

.value{
  font-size:15px;
  font-weight:800;
  margin-top:4px;
  color:#0B3D21;
}

.muted{opacity:.5}

/* BAR */
.bar{
  margin-top:10px;
  height:6px;
  background:#FDF3E1;
  border-radius:999px;
  overflow:hidden;
  border:1px solid rgba(11,61,33,0.15);
}

.bar div{
  height:100%;
  width:0%;
  background:#0B3D21;
  transition:1s ease;
}
.card{
  display:flex !important;
  flex-direction:column !important;
  justify-content:center !important;
}
@media(max-width: 480px){
  .value{
  font-size:10px !important;
  font-weight:800;
  margin-top:4px;
  color:#0B3D21;
}
}
/* ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes fadeDown{
  from{opacity:0;transform:translateY(-10px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes pop{
  from{transform:scale(.9);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:.6;}
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Abiturient: Ibragimova Marxabo</h1>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="summary-top">
      <div class="total" id="jami">0</div>
      <div class="status">Yaxshi</div>
    </div>
    <div style="font-size:12px;margin-top:6px;opacity:.7" id="jami-max"></div>

    <div class="progress">
      <div id="heroBar"></div>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards" id="cards"></div>

</div>

<script>
const fanlar=[
 {nom:"Matematika",tur:"Mutaxassislik",maksimal:93,foiz:75.31,toplangan:70.04},
 {nom:"Fizika",tur:"Mutaxassislik",maksimal:63,foiz:76.35,toplangan:48.1},
 {nom:"Matematika",tur:"Majburiy",maksimal:11,foiz:100,toplangan:11},
 {nom:"Ona tili",tur:"Majburiy (Hali imtihon topshirmagan)",maksimal:11,foiz:0,toplangan:0},
 {nom:"Tarix",tur:"Majburiy (Hali imtihon topshirmagan)",maksimal:11,foiz:0,toplangan:0},
];

let jami=0,jamiMax=0;
const box=document.getElementById("cards");

fanlar.forEach(f=>{
 jami+=f.toplangan;
 jamiMax+=f.maksimal;

 const card=document.createElement("div");
 card.className="card";

 const sertifikat =
  f.foiz>0
   ? `Sertifikat foizi: ${f.foiz.toFixed(2)}%`
   : `Sertifikat yo‘q`;

 card.innerHTML=`
  <div class="top">
    <div class="name">${f.nom}</div>
    <div class="badge">${f.tur}</div>
  </div>

  <div class="stats">
    <div class="box">
      <div class="label">Maksimal ball</div>
      <div class="value">${f.maksimal}</div>
    </div>

    <div class="box">
      <div class="label">Sertifikat</div>
      <div class="value ${f.foiz>0?'':'muted'}">${sertifikat}</div>
    </div>

    <div class="box">
      <div class="label">Toplangan</div>
      <div class="value">${f.toplangan}</div>
    </div>
  </div>

  <div class="bar">
    <div style="width:${f.foiz}%"></div>
  </div>
 `;

 box.appendChild(card);
});

document.getElementById("jami").innerText=jami.toFixed(2);
document.getElementById("jami-max").innerText="Maksimal ball: "+jamiMax;

document.getElementById("heroBar").style.width=(jami/jamiMax*100)+"%";
</script>

</body>
</html>
